version: '3.7'

services:

  # PHP 8.3 test runner for Laravel 13. Shares the rabbitmq network namespace
  # so the suite's hardcoded 127.0.0.1 (see phpunit.xml.dist) reaches RabbitMQ.
  # Run with:  docker compose run --rm tests
  tests:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: "8.3"
    depends_on:
      - rabbitmq
    network_mode: "service:rabbitmq"
    volumes:
      - ".:/app"
    working_dir: /app
    environment:
      LARAVEL_VERSION: "^13.0"
    command:
      - bash
      - -c
      - |
        set -e
        composer update --with="laravel/framework:$${LARAVEL_VERSION}" --prefer-dist --no-interaction --no-progress
        echo "Waiting for RabbitMQ on 127.0.0.1:5672..."
        until (echo > /dev/tcp/127.0.0.1/5672) 2>/dev/null; do sleep 2; done
        echo "RabbitMQ is up. Running Pint (non-blocking) + PHPUnit..."
        vendor/bin/pint --test || echo "NOTE: Pint reported style issues (non-blocking)."
        vendor/bin/phpunit

  rabbitmq:
    image: rabbitmq:3.8
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASSWORD: guest
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_SSL_CACERTFILE: /rootCA.pem
      RABBITMQ_SSL_CERTFILE: /rootCA.pem
      RABBITMQ_SSL_KEYFILE: /rootCA.key
      RABBITMQ_SSL_VERIFY: verify_none
      RABBITMQ_SSL_FAIL_IF_NO_PEER_CERT: "false"
    volumes:
      - "./tests/files/rootCA.pem:/rootCA.pem:ro"
      - "./tests/files/rootCA.key:/rootCA.key:ro"
    ports:
      - "15671:15671"
      - "15672:15672"
      - "5671:5671"
      - "5672:5672"

  rabbitmq-management:
    image: rabbitmq:management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASSWORD: guest
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_MANAGEMENT_SSL_CACERTFILE: /rootCA.pem
      RABBITMQ_MANAGEMENT_SSL_CERTFILE: /rootCA.pem
      RABBITMQ_MANAGEMENT_SSL_KEYFILE: /rootCA.key
      RABBITMQ_MANAGEMENT_SSL_VERIFY: verify_none
      RABBITMQ_MANAGEMENT_SSL_FAIL_IF_NO_PEER_CERT: "false"
    volumes:
      - "./tests/files/rootCA.pem:/rootCA.pem:ro"
      - "./tests/files/rootCA.key:/rootCA.key:ro"
    ports:
      - 15671:15671
      - 15672:15672
      - 5671:5671
      - 5672:5672
